name: Weekly LLMOps Newsletter

on:
  schedule:
    # 12:41 Netherlands time during summer, CEST UTC+2
    - cron: "56 10 * * THU"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --no-install-project

      - name: Ingest Hugging Face dataset
        run: uv run python ingest_dataset.py

      - name: Process and analyze newsletter items
        env:
          # Needed by llm_summarizer.py; falls back to heuristic if absent.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uv run python process_analyze.py

      - name: Generate newsletter
        run: uv run python generate_newsletter.py

      - name: Show dedup state (audit log)
        run: |
          if [ -f data/published_ids.json ]; then
            echo "Total ids in dedup state: $(jq length data/published_ids.json)"
          else
            echo "No dedup state file yet."
          fi

      - name: Commit newsletter and dedup state
        # Commits the generated markdown plus the small cross-run state
        # files (data/published_ids.json, data/llm_summaries_cache.json).
        # All other files in data/ are gitignored so we don't bloat history.
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add data/ newsletter_outputs/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Generate weekly LLMOps newsletter [skip ci]"
            git push
          fi